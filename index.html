<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ═══════════════════════════════════════
// ⚙️ CONFIGURAÇÃO FIREBASE
// Substitua com as suas credenciais do Firebase Console
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAoMr5N_z16gEVWzYFYq2ZR-Dzk9N34ueI",
  authDomain: "bolao-da-copa-2026-dc883.firebaseapp.com",
  databaseURL: "https://bolao-da-copa-2026-dc883-default-rtdb.firebaseio.com",
  projectId: "bolao-da-copa-2026-dc883",
  storageBucket: "bolao-da-copa-2026-dc883.firebasestorage.app",
  messagingSenderId: "406321405660",
  appId: "1:406321405660:web:b96f19aab059da48319e19"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window._fbGet = async (key) => {
  try {
    const snap = await get(ref(db, 'bolao/' + key));
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.error('fbGet',e); return null; }
};
window._fbSet = async (key, val) => {
  try { await set(ref(db, 'bolao/' + key), val); } catch(e) { console.error('fbSet',e); }
};
window._fbListen = (key, cb) => {
  onValue(ref(db, 'bolao/' + key), snap => cb(snap.exists() ? snap.val() : null));
};
window._firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
:root{
  --bg:#F5EFF9;
  --card:#FFFFFF;
  --text:#1D1D1F;
  --text2:#6A3D7A;
  --text3:#B39DBC;
  --sep:#E1C9ED;
  --blue:#660099;
  --blue-dark:#4B0073;
  --blue-soft:#F3E5F5;
  --red:#FF3B30;
  --orange:#FF9500;
  --green:#34C759;
  --gold:#FFD60A;
  --silver:#C7C7CC;
  --gray:#8E8E93;
  --black:#1C1C1E;
}
[data-dark="1"]{
  --bg:#1C1C1E;
  --card:#2C2C2E;
  --text:#F2F2F7;
  --text2:#C9A8DC;
  --text3:#6C5A7A;
  --sep:#3A3A3C;
  --blue-soft:#3A1A4A;
}
[data-dark="1"] .login-box{background:#2C2C2E;}
[data-dark="1"] .login-inp{background:#3A3A3C;border-color:#4A4A4C;color:#F2F2F7;}
[data-dark="1"] .login-inp::placeholder{color:#6C5A7A;}
[data-dark="1"] .nav{background:#2C2C2E;border-bottom-color:#3A3A3C;}
[data-dark="1"] .nb{color:#C9A8DC;}
[data-dark="1"] .nb.on{color:#BB86FC;}
[data-dark="1"] .nb.on{border-bottom-color:#BB86FC;}
[data-dark="1"] .hdr{background:linear-gradient(180deg,#4B0073 0%,#2A003F 100%);}
[data-dark="1"] .jcard{background:#2C2C2E;border-color:#3A3A3C;}
[data-dark="1"] input[type=number]{background:#3A3A3C;color:#F2F2F7;border-color:#4A4A4C;}
[data-dark="1"] .inp{background:#3A3A3C;color:#F2F2F7;border-color:#4A4A4C;}
[data-dark="1"] .aviso{background:#2A1A35;border-color:#4A2A5A;}
[data-dark="1"] .premia-row{background:rgba(187,134,252,.08);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.4;}
.app{min-height:100vh;}

/* CONFIG BANNER */
.cfg-banner{background:var(--red);color:#fff;padding:12px 16px;font-size:13px;font-weight:600;text-align:center;line-height:1.5;}
.cfg-banner a{color:#fff;text-decoration:underline;}

/* LOGIN */
.login-wrap{position:fixed;inset:0;background:linear-gradient(160deg,#660099 0%,#4B0073 100%);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border-radius:18px;padding:32px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.login-bola{font-size:48px;display:block;margin-bottom:8px;}
.login-tit{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:24px;}
.login-inp{width:100%;padding:14px 16px;font-size:16px;font-family:inherit;border:1.5px solid var(--sep);background:#fff;border-radius:12px;margin-bottom:10px;font-weight:500;outline:none;color:var(--text);transition:border-color .15s;}
.login-inp:focus{border-color:var(--blue);}
.login-inp::placeholder{color:var(--text3);}
.login-btn{background:var(--blue);color:#fff;border:none;padding:14px;font-size:16px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-top:6px;transition:background .15s;}
.login-btn:hover{background:var(--blue-dark);}
.login-err{background:#FFE5E5;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--red);margin-top:10px;}
.login-hint{margin-top:18px;padding-top:16px;border-top:1px solid var(--sep);font-size:12px;color:var(--text3);font-weight:500;}
.login-codigo-hint{margin-top:10px;background:#E3F2FD;border:none;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--blue);font-weight:600;}

/* HEADER */
.hdr{background:linear-gradient(180deg,#660099 0%,#4B0073 100%);color:#fff;padding:20px 16px 16px;text-align:center;}
.hdr-inner{position:relative;}
.hdr h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1.1;}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:4px;font-weight:500;}
.hdr-user{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.hdr-user > span:first-child{font-size:13px;color:rgba(255,255,255,.95);font-weight:500;}
.badge-admin{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.2px;}
.badge-user{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.logout-btn{background:rgba(255,255,255,.25);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,.35);}

/* NAV */
.nav{display:flex;background:var(--card);overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--sep);box-shadow:0 2px 8px rgba(0,40,100,.04);}
.nav::-webkit-scrollbar{display:none;}
.nb{flex:none;padding:12px 16px;color:var(--text2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nb:hover{color:var(--text);}
.nb.on{color:var(--blue);border-bottom-color:var(--blue);}
.nav-spacer{flex:1;}

/* WRAP */
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 80px;}

/* LOADING */
.spin{width:36px;height:36px;border:3px solid var(--sep);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:14px;font-weight:600;color:var(--text2);}

/* SYNC badge */
.sync-badge{position:fixed;top:8px;right:8px;background:var(--text);color:#fff;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.15);}

/* CARD */
.card{background:var(--card);border-radius:14px;box-shadow:0 2px 8px rgba(0,40,100,.08);margin-bottom:14px;overflow:hidden;border:1px solid var(--sep);}
.ct{background:var(--blue-soft);color:var(--text);padding:14px 16px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--sep);letter-spacing:-0.2px;}
.cb{padding:16px;}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg);color:var(--text2);margin-left:auto;}

/* FORM */
.lbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:-0.2px;}
.inp{width:100%;padding:12px 14px;font-size:15px;font-family:inherit;border:1.5px solid var(--sep);background:var(--card);border-radius:10px;margin-bottom:10px;font-weight:500;outline:none;color:var(--text);transition:all .15s;}
.inp:focus{border-color:var(--blue);background:#fff;}
.inp::placeholder{color:var(--text3);}
.btn{background:var(--blue);color:#fff;border:none;padding:14px;font-size:16px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;transition:background .15s;margin-top:4px;display:block;}
.btn:hover{background:var(--blue-dark);}
.btn2{background:var(--card);color:var(--blue);border:1px solid var(--sep);padding:12px;font-size:15px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-top:6px;display:block;transition:background .15s;}
.btn2:hover{background:var(--bg);}
.btnR{background:var(--red);color:#fff;border:none;padding:12px;font-size:15px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-top:6px;display:block;}
.aviso{background:#FFF8E1;border:none;border-radius:10px;padding:12px 14px;font-size:13px;color:#8D6E00;font-weight:500;margin-top:8px;line-height:1.5;}

/* PARTICIPANTE */
.pi-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .15s;}
.pi-item:last-child{border-bottom:none;}
.pi-item:hover{background:var(--bg);}
.pin{width:32px;height:32px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
.pi-info{flex:1;min-width:0;}
.pi-nome{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.pi-st{font-size:12px;color:var(--text2);font-weight:500;margin-top:2px;}

/* JOGO CARD */
.jcard{border:1px solid var(--sep);border-radius:12px;margin-bottom:10px;background:var(--card);overflow:hidden;}
.jtopo{background:var(--bg);padding:6px 12px;font-size:11px;color:var(--text2);font-weight:600;display:flex;justify-content:space-between;letter-spacing:0.2px;}
.jcorpo{padding:12px;display:flex;align-items:center;gap:8px;background:var(--card);}
.tnome{flex:1;font-size:clamp(13px,3vw,15px);font-weight:600;color:var(--text);text-align:center;line-height:1.2;letter-spacing:-0.2px;}
.tnome.tbd{color:var(--text3);font-style:italic;font-weight:500;}
.vs{color:var(--text3);font-weight:700;font-size:11px;flex-shrink:0;letter-spacing:0.5px;}
.pinps{display:flex;align-items:center;gap:6px;justify-content:center;padding:0 12px 12px;background:var(--card);}
.pi-num{width:48px;height:48px;font-size:20px;font-family:inherit;font-weight:700;text-align:center;border:1.5px solid var(--sep);border-radius:10px;background:var(--card);color:var(--text);outline:none;transition:all .15s;-moz-appearance:textfield;}
.pi-num::-webkit-outer-spin-button,.pi-num::-webkit-inner-spin-button{-webkit-appearance:none;}
.pi-num:focus{border-color:var(--blue);background:#F0F8FF;}
.pi-num:disabled{background:var(--bg);color:var(--text3);cursor:not-allowed;border-color:var(--sep);}
.px{font-family:inherit;font-size:14px;color:var(--text3);font-weight:600;}
.badj{width:32px;height:32px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;transition:background .15s;}
.badj:hover{background:var(--blue-dark);}
.badj:disabled{background:var(--text3);cursor:not-allowed;}

/* ${t("GRUPO","GROUP")} HEADER */
.gh{display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding:10px 14px;background:var(--blue-soft);border-radius:10px;color:var(--text);}
.gl{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-0.3px;}
.gi{font-size:11px;font-weight:500;color:var(--text2);}

/* FASE MM */
.mm-fase-tit{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;margin:18px 0 8px;padding:10px 14px;background:var(--blue-soft);border-radius:10px;border-left:4px solid #660099;}

/* RANKING */
.rk-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--sep);}
.rk-item:last-child{border-bottom:none;}
.rpos{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.rpos.g{background:var(--gold);color:#5D4300;}
.rpos.s{background:var(--silver);color:#3A3A3C;}
.rpos.b{background:#CD7F32;color:#fff;}
.rpos.last{background:var(--text);color:#fff;}
.rpos.n{background:var(--bg);color:var(--text2);}
.rpos.q{background:#CD7F32;color:#fff;}
.rnome{flex:1;font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.rnome-sub{font-size:12px;color:var(--text2);font-weight:500;margin-top:2px;}
.rpts{background:var(--blue);color:#fff;padding:6px 14px;border-radius:20px;font-weight:700;font-size:14px;}

/* WHATSAPP */
.btn-whatsapp{background:#25D366;color:#fff;border:none;padding:14px;font-size:15px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s;}
.btn-whatsapp:hover{background:#1FAD53;}

/* REGRAS */
.rrow{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--sep);}
.premia-row{display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:8px;background:rgba(102,0,153,.05);border-radius:10px;border-left:4px solid #660099}
.premia-pos{flex:1;font-weight:700;font-size:15px;}
.premia-val{font-size:16px;font-weight:700;color:#660099;min-width:120px;text-align:right}
.premia-pct{font-size:12px;color:#999;min-width:40px;text-align:right}
.rrow:last-child{border-bottom:none;}
.ricon{font-size:22px;flex-shrink:0;}
.rdesc{flex:1;}
.rtit{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.rsub{font-size:12px;color:var(--text2);font-weight:500;margin-top:2px;}
.rnum{width:62px;padding:8px 10px;font-size:15px;font-family:inherit;font-weight:600;text-align:center;border:1.5px solid var(--sep);border-radius:8px;background:var(--card);color:var(--text);outline:none;-moz-appearance:textfield;}
.rnum::-webkit-outer-spin-button,.rnum::-webkit-inner-spin-button{-webkit-appearance:none;}
.rnum:focus{border-color:var(--blue);}

/* RESULTADO ADMIN */
.res-row{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.res-row-tit{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.res-row-body{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.res-inp{width:42px;height:38px;font-size:16px;font-weight:600;text-align:center;border:1.5px solid var(--sep);border-radius:8px;font-family:inherit;color:var(--text);background:var(--card);outline:none;-moz-appearance:textfield;}
.res-inp::-webkit-outer-spin-button,.res-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.res-inp:focus{border-color:var(--blue);}
.res-time{font-size:12px;font-weight:600;flex:1;min-width:50px;color:var(--text);}
.res-time.right{text-align:right;}
.pen-sel{padding:6px 8px;border:1.5px solid var(--sep);border-radius:8px;font-size:11px;font-weight:600;outline:none;font-family:inherit;background:var(--card);color:var(--text);}

/* MODAL */
.m-over{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px);}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mh{background:var(--card);color:var(--text);padding:16px 20px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sep);}
.mh h2{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.mclose{background:var(--bg);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;font-weight:600;}
.mb{padding:20px;}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;}
.toast{background:var(--text);color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;animation:toastIn .25s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* BADGES */
.badge-lock{background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;}
.badge-open{background:var(--green);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;}
.btn-lock{background:var(--red);color:#fff;border:none;padding:8px 12px;font-size:13px;font-family:inherit;font-weight:600;border-radius:8px;cursor:pointer;flex-shrink:0;}
.btn-unlock{background:var(--green);color:#fff;border:none;padding:8px 12px;font-size:13px;font-family:inherit;font-weight:600;border-radius:8px;cursor:pointer;flex-shrink:0;}
.btn-confirm{background:linear-gradient(135deg,#00C853,#00A040);color:#fff;border:none;padding:16px;font-size:17px;font-family:inherit;font-weight:700;border-radius:14px;cursor:pointer;width:100%;margin-top:8px;display:block;transition:all .2s;box-shadow:0 4px 16px rgba(0,200,83,.3);letter-spacing:-0.3px;}
.btn-confirm:hover{background:linear-gradient(135deg,#00A040,#007A30);box-shadow:0 6px 20px rgba(0,200,83,.4);}
.aviso-lock{background:#FFF4E5;border:none;border-radius:10px;padding:12px 14px;font-size:13px;color:#995900;font-weight:600;margin-top:8px;text-align:center;}
.btn-foto{background:#5856D6;color:#fff;border:none;padding:13px;font-size:15px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-export{background:var(--blue);color:#fff;border:none;padding:13px;font-size:15px;font-family:inherit;font-weight:600;border-radius:12px;cursor:pointer;width:100%;margin-bottom:8px;display:block;}
.codigo-box{background:var(--bg);border:none;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px;}
.codigo-atual{font-size:32px;font-weight:700;color:var(--text);letter-spacing:4px;line-height:1.1;font-family:inherit;}
.codigo-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.grupo-chip{display:inline-block;padding:4px 10px;background:var(--bg);border-radius:8px;font-size:12px;font-weight:500;color:var(--text);margin:2px;}
select{font-family:inherit;}

.lang-btn{position:fixed;top:12px;right:12px;z-index:9999;background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-weight:700;font-size:12px;
  padding:5px 10px;border-radius:20px;cursor:pointer;letter-spacing:.5px;
  transition:all .2s;font-family:inherit;}
.lang-btn:hover{background:rgba(255,255,255,0.25);}
.lang-btn.dark{background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.2);}
</style>

<script>
// ══════════════════════════════════════════════════════
// DADOS FIXOS
// ══════════════════════════════════════════════════════
const GRUPOS = [

const nomeCurto = s => s ? s.replace(/\s\S+$/, '') : (s||'');

function calcClassif(grupoLetra, posIdx, resultados) {
  const g = GRUPOS.find(x => x.l === grupoLetra);
  if (!g) return null;
  const pts = {}; g.t.forEach(t => { pts[t]={p:0,sg:0,gm:0}; });
  const jogos = JOGOS_GRUPO.filter(j => j.grupo === grupoLetra);
  let jogou = false;
  jogos.forEach(j => {
    const r = resultados[j.id];
    if (!r||r.g1===''||r.g2==='') return;
    jogou = true;
    const g1=+r.g1,g2=+r.g2;
    pts[j.t1].gm+=g1; pts[j.t2].gm+=g2;
    pts[j.t1].sg+=g1-g2; pts[j.t2].sg+=g2-g1;
    if(g1>g2)pts[j.t1].p+=3; else if(g1<g2)pts[j.t2].p+=3; else{pts[j.t1].p++;pts[j.t2].p++;}
  });
  if (!jogou) return null;
  const rank = g.t.slice().sort((a,b)=>{const A=pts[a],B=pts[b];return B.p-A.p||B.sg-A.sg||B.gm-A.gm||a.localeCompare(b);});
  return rank[posIdx]||null;
}
function calcMelhorTerceiro(grupasStr, resultados) {
  let melhor=null,melhorScore={p:-1,sg:-999};
  grupasStr.split('').forEach(l => {
    const t=calcClassif(l,2,resultados); if(!t)return;
    const g=GRUPOS.find(x=>x.l===l),pts={};
    g.t.forEach(tm=>{pts[tm]={p:0,sg:0,gm:0};});
    JOGOS_GRUPO.filter(j=>j.grupo===l).forEach(j=>{
      const r=resultados[j.id]; if(!r||r.g1===''||r.g2==='')return;
      const g1=+r.g1,g2=+r.g2;
      pts[j.t1].gm+=g1;pts[j.t2].gm+=g2;pts[j.t1].sg+=g1-g2;pts[j.t2].sg+=g2-g1;
      if(g1>g2)pts[j.t1].p+=3;else if(g1<g2)pts[j.t2].p+=3;else{pts[j.t1].p++;pts[j.t2].p++;}
    });
    const p=pts[t];
    if(p&&(p.p>melhorScore.p||(p.p===melhorScore.p&&p.sg>melhorScore.sg))){melhor=t;melhorScore=p;}
  });
  return melhor;
}
function resolveTime(key,resultados){
  if(!key)return null;
  if(key.startsWith('W:'))return getVencedor(key.slice(2),resultados);
  if(key.startsWith('L:'))return getPerdedor(key.slice(2),resultados);
  const pos=parseInt(key[0]),grupos=key.slice(1);
  return pos<=2?calcClassif(grupos,pos-1,resultados):calcMelhorTerceiro(grupos,resultados);
}
function getVencedor(id,resultados){
  const r=resultados[id],j=JOGOS_MM.find(x=>x.id===id);
  if(!j||!r||r.g1===''||r.g2==='')return null;
  const g1=+r.g1,g2=+r.g2;
  const t1=resolveTime(j.t1k,resultados),t2=resolveTime(j.t2k,resultados);
  if(!t1||!t2)return null;
  if(g1>g2)return t1;if(g1<g2)return t2;
  if(r.pen==='1')return t1;if(r.pen==='2')return t2;
  return null;
}
function getPerdedor(id,resultados){
  const r=resultados[id],j=JOGOS_MM.find(x=>x.id===id);
  if(!j||!r||r.g1===''||r.g2==='')return null;
  const g1=+r.g1,g2=+r.g2;
  const t1=resolveTime(j.t1k,resultados),t2=resolveTime(j.t2k,resultados);
  if(!t1||!t2)return null;
  if(g1>g2)return t2;if(g1<g2)return t1;
  if(r.pen==='1')return t2;if(r.pen==='2')return t1;
  return null;
}
function calcularPontos(partics,palpites,especiais,resultados,resEsp,regras){
  const R=regras,pts={},exatos={};
  const palIdx={};
  Object.keys(palpites).forEach(k=>{palIdx[k.toLowerCase()]=k;});
  partics.forEach(p=>{pts[getNome(p)]=0;exatos[getNome(p)]=0;});
  partics.forEach(p=>{
    const n=getNome(p),nLow=n.toLowerCase();
    const palKey=palIdx[nLow]||n,palMMKey=palIdx[nLow+'_mm']||(n+'_mm');
    const pal=palpites[palKey]||{};
    JOGOS_GRUPO.forEach(j=>{
      const r=resultados[j.id],pp=pal[j.id];
      if(!r||r.g1===''||r.g2===''||!pp||pp.g1===''||pp.g2==='')return;
      const rg1=+r.g1,rg2=+r.g2,pg1=+pp.g1,pg2=+pp.g2;
      if(pg1===rg1&&pg2===rg2){pts[n]+=R.r_exato;exatos[n]++;}
      else{const rv=rg1>rg2?1:rg1<rg2?-1:0,pv=pg1>pg2?1:pg1<pg2?-1:0;if(rv===pv)pts[n]+=R.r_venc;}
    });
    const palMM=palpites[palMMKey]||{};
    JOGOS_MM.forEach(j=>{
      const r=resultados[j.id],pp=palMM[j.id];
      if(!r||r.g1===''||r.g2===''||!pp||pp.g1===''||pp.g2==='')return;
      const rg1=+r.g1,rg2=+r.g2,pg1=+pp.g1,pg2=+pp.g2;
      const rv=rg1>rg2?1:rg1<rg2?-1:0,pv=pg1>pg2?1:pg1<pg2?-1:0;
      if(pg1===rg1&&pg2===rg2){pts[n]+=R.r_mmexato;exatos[n]++;}
      else if(rv===pv&&rv!==0)pts[n]+=R.r_mmvenc;
      // Empate no tempo normal: ninguém ganha ponto de vencedor (pênaltis não contam para pontuação)
    });
    const espNomes=Object.keys(especiais);
    const espMatch=espNomes.find(k=>k.toLowerCase()===nLow)||n;
    const e=especiais[espMatch]||{};
    if(resEsp.camp&&e.camp&&e.camp.trim().toLowerCase()===resEsp.camp.trim().toLowerCase())pts[n]+=R.r_camp;
    if(resEsp.vice&&e.vice&&e.vice.trim().toLowerCase()===resEsp.vice.trim().toLowerCase())pts[n]+=R.r_vice;
    if(resEsp.art&&e.art&&e.art.trim().toLowerCase()===resEsp.art.trim().toLowerCase())pts[n]+=R.r_art;
  });
  return{pts,exatos};
}

async function fazerLogin(lembrar){
  const nomeRaw=STATE.loginNome.trim();
  if(!nomeRaw){STATE.loginErro='✏️ Digite seu nome!';render();return;}
  const keyNorm=nomeRaw.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const isAdmin=ADMINS[keyNorm]&&ADMINS[keyNorm]===STATE.loginSenha.trim();
  const isAdminName=Object.keys(ADMINS).includes(keyNorm);
  if(isAdminName&&!isAdmin&&STATE.loginSenha.trim()!==''){STATE.loginErro='❌ Senha incorreta!';render();return;}
  if(!isAdmin){
    const senhaDigitada=STATE.loginSenha.trim();
    const nomeKey=nomeRaw.toLowerCase();
    const codigoIndividual=STATE.codigos&&Object.keys(STATE.codigos).find(k=>k.toLowerCase()===nomeKey);
    const codigoEsperado=codigoIndividual?STATE.codigos[codigoIndividual]:STATE.codigo;
    if(senhaDigitada!==codigoEsperado){STATE.loginErro='Codigo invalido!';render();return;}
    const jaExiste=STATE.partics.find(p=>getNome(p).toLowerCase()===nomeRaw.toLowerCase());
    if(!jaExiste){
      const novos=[...STATE.partics,{nome:nomeRaw,bloqueado:false}];
      STATE.partics=novos;
      await fbSet('partics',novos);
    }
  }
  // Salvar credenciais se "Manter conectado" estiver marcado
  const deveLembrar = lembrar !== undefined ? lembrar : STATE.lembrarLogin;
  if(deveLembrar){
    localStorage.setItem('bolao_nome', nomeRaw);
    localStorage.setItem('bolao_senha', STATE.loginSenha.trim());
    localStorage.setItem('bolao_lembrar','1');
  } else {
    localStorage.removeItem('bolao_nome');
    localStorage.removeItem('bolao_senha');
    localStorage.setItem('bolao_lembrar','0');
  }
  STATE.loginErro='';STATE.partAtual=null;STATE.partMMAtual=null;STATE.partEspAtual=null;
  STATE.aba='palpites';
  STATE.usuario={nome:nomeRaw,isAdmin};
  // Registrar último acesso (sem tocar nos palpites)
  if(!isAdmin){
    const agora=new Date().toISOString();
    const acessos=await fbGet('acessos')||{};
    acessos[nomeRaw]=agora;
    fbSet('acessos',acessos);
  }
  showToast('👋 Bem-vindo, '+nomeRaw+'!');
}

function gerarGraficoSVG(dados, width, height){
  // dados = [{label, valor}]
  if(!dados||dados.length<2) return '<div style="text-align:center;color:#aaa;padding:20px;font-size:13px">'+t('Ainda sem dados suficientes para o gráfico.','Not enough data for the chart yet.')+'<br>'+t('O histórico é gerado conforme resultados são inseridos.','History is generated as results are entered.')+'</div>';
  const maxVal=Math.max(...dados.map(d=>d.valor),1);
  const padL=8,padR=8,padT=16,padB=28;
  const w=width||320, h=height||140;
  const pw=w-padL-padR, ph=h-padT-padB;
  const pts=dados.map((d,i)=>({
    x:padL+(i/(dados.length-1))*pw,
    y:padT+ph-(d.valor/maxVal)*ph,
    label:d.label,
    valor:d.valor
  }));
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const areaD=pathD+' L'+pts[pts.length-1].x.toFixed(1)+','+(padT+ph)+' L'+padL+','+(padT+ph)+' Z';
  const dark=STATE.darkMode;
  const lineColor='#BB86FC';
  const areaColor=dark?'rgba(187,134,252,.15)':'rgba(102,0,153,.12)';
  const textColor=dark?'#C9A8DC':'#6A3D7A';
  let svg=`<svg width="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;
  // Linhas guia
  [0,.5,1].forEach(p=>{
    const y=padT+ph*(1-p);
    svg+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="${dark?'#3A3A3C':'#E1C9ED'}" stroke-width="1"/>`;
    svg+=`<text x="${padL}" y="${(y-3).toFixed(1)}" font-size="9" fill="${textColor}" opacity="0.6">${Math.round(maxVal*p)}</text>`;
  });
  // Área
  svg+=`<path d="${areaD}" fill="${areaColor}"/>`;
  // Linha
  svg+=`<path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  // Pontos e labels
  pts.forEach((p,i)=>{
    svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${lineColor}" stroke="${dark?'#1C1C1E':'#fff'}" stroke-width="2"/>`;
    svg+=`<text x="${p.x.toFixed(1)}" y="${(padT+ph+14).toFixed(1)}" text-anchor="middle" font-size="8" fill="${textColor}" opacity="0.7">${p.label}</text>`;
    if(i===pts.length-1||i===0||dados.length<=6){
      svg+=`<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="bold" fill="${lineColor}">${p.valor}</text>`;
    }
  });
  svg+='</svg>';
  return svg;
}

function calcularHistorico(nome, palpites, resultados, resEsp, especiais, regras){
  // Retorna evolução de pontos jogo a jogo
  const pal=palpites[nome]||{};
  const palMM=palpites[nome+'_mm']||{};
  const esp=especiais[nome]||{};
  const dados=[];
  let total=0;
  // Grupos — só jogos com resultado
  const jogosComRes=JOGOS_GRUPO.filter(j=>{
    const r=resultados[j.id];
    return r&&r.g1!==''&&r.g2!=='';
  });
  // Agrupar por semana/fase
  let jCount=0;
  jogosComRes.forEach(j=>{
    const r=resultados[j.id];
    const p=pal[j.id];
    if(!p||p.g1===''||p.g2==='') return;
    const rg1=+r.g1,rg2=+r.g2,pg1=+p.g1,pg2=+p.g2;
    if(pg1===rg1&&pg2===rg2) total+=regras.r_exato||25;
    else{const rv=rg1>rg2?1:rg1<rg2?-1:0,pv=pg1>pg2?1:pg1<pg2?-1:0;if(rv===pv)total+=regras.r_venc||10;}
    jCount++;
    if(jCount%6===0||jCount===jogosComRes.length){
      dados.push({label:'J'+jCount, valor:total});
    }
  });
  // Especiais
  if(resEsp&&esp){
    if(resEsp.camp&&esp.camp&&resEsp.camp.toLowerCase()===esp.camp.toLowerCase()) total+=regras.r_camp||30;
    if(resEsp.vice&&esp.vice&&resEsp.vice.toLowerCase()===esp.vice.toLowerCase()) total+=regras.r_vice||15;
    if(resEsp.art&&esp.art&&resEsp.art.toLowerCase()===esp.art.toLowerCase()) total+=regras.r_art||20;
    if(dados.length>0) dados.push({label:'Esp', valor:total});
  }
  return dados;
}

async function compartilharRanking(ranking,pts,exatos){
  try{
    await document.fonts.load('900 48px Inter');
    await document.fonts.load('700 22px Inter');
    await document.fonts.load('600 18px Inter');
  }catch(e){}

  const SCALE=3;
  const W=680;
  const N=ranking.length;
  const LINHA=N<=12?80:N<=16?70:N<=20?62:N<=25?56:50;
  const PADX=28;
  const TOP=170;
  const BOT=56;
  const H=TOP+N*LINHA+BOT;

  const canvas=document.createElement('canvas');
  canvas.width=W*SCALE;
  canvas.height=H*SCALE;
  const ctx=canvas.getContext('2d');
  ctx.scale(SCALE,SCALE);
  ctx.textBaseline='middle';

  // ── HEADER ──
  const hg=ctx.createLinearGradient(0,0,W,TOP);
  hg.addColorStop(0,'#2D004F');
  hg.addColorStop(0.5,'#660099');
  hg.addColorStop(1,'#9B30D9');
  ctx.fillStyle=hg;
  ctx.fillRect(0,0,W,TOP);

  // brilho
  const rad=ctx.createRadialGradient(W*0.75,0,0,W*0.75,0,W*0.55);
  rad.addColorStop(0,'rgba(255,255,255,0.14)');
  rad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rad; ctx.fillRect(0,0,W,TOP);

  // texto header
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font='600 12px Inter,Arial';
  ctx.fillText('B O L Ã O   C O P A   D O   M U N D O', W/2, 34);

  ctx.fillStyle='#FFFFFF';
  ctx.font='900 50px Inter,Arial';
  ctx.fillText('RANKING 2026', W/2, 90);

  ctx.font='36px Arial';
  ctx.fillText('🏆', W/2-210, 88);
  ctx.fillText('🏆', W/2+210, 88);

  // data no canto inferior do header, discreta
  const data=new Date().toLocaleDateString('pt-BR')+' • '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  ctx.font='500 11px Inter,Arial';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText(data, W/2, 140);

  // ── CARTÃO BRANCO ──
  const cardX=16,cardY=TOP-22,cardW=W-32,cardH=H-cardY-12;
  ctx.shadowColor='rgba(40,0,80,0.22)';
  ctx.shadowBlur=28;
  ctx.shadowOffsetY=6;
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath(); ctx.roundRect(cardX,cardY,cardW,cardH,18); ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // ── LINHAS ──
  ranking.forEach((p,i)=>{
    const n=getNome(p);
    const pontos=pts[n]||0;
    const ex=exatos[n]||0;
    const y=TOP+i*LINHA;
    const cy=y+LINHA/2;
    const isLast=i===N-1&&N>1;
    const isPenult=i===N-2&&N>2;
    const isAntepenult=i===N-3&&N>3;

    const rx=cardX+10, ry=y+3, rw=cardW-20, rh=LINHA-6;

    // ── FUNDO ──
    if(i===0){
      // Ouro — gradiente dourado vibrante
      const g=ctx.createLinearGradient(rx,0,rx+rw*0.5,0);
      g.addColorStop(0,'#FFF3C4'); g.addColorStop(1,'#FFFDF7');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(i===1){
      // Prata
      const g=ctx.createLinearGradient(rx,0,rx+rw*0.5,0);
      g.addColorStop(0,'#EAEAEA'); g.addColorStop(1,'#F8F8F8');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(i===2){
      // Bronze
      const g=ctx.createLinearGradient(rx,0,rx+rw*0.5,0);
      g.addColorStop(0,'#FFE8CC'); g.addColorStop(1,'#FFF7EF');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(isLast){
      // Lanterna
      ctx.fillStyle='#FDECEA';
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(isPenult){
      // Tartaruga
      ctx.fillStyle='#F1F8E9';
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(isAntepenult){
      // Dormindo
      ctx.fillStyle='#E8EAF6';
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    } else if(i%2===0){
      ctx.fillStyle='#F7F5FA';
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,12); ctx.fill();
    }

    // ── BARRA LATERAL ──
    const barColors={
      0:'#F5B400', 1:'#8C9BA5', 2:'#C87941',
      last:'#E53935', penult:'#7CB342', antepenult:'#3949AB'
    };
    let barC=i===0?barColors[0]:i===1?barColors[1]:i===2?barColors[2]
      :isLast?barColors.last:isPenult?barColors.penult:isAntepenult?barColors.antepenult:null;
    if(barC){
      ctx.fillStyle=barC;
      ctx.beginPath(); ctx.roundRect(rx,ry,5,rh,2.5); ctx.fill();
    }

    // ── MEDALHA / POSIÇÃO ──
    ctx.textAlign='center';
    const medals=['🥇','🥈','🥉'];
    const specials={last:'🔦',penult:'🐢',antepenult:'😴'};
    const sym=i<3?medals[i]:isLast?specials.last:isPenult?specials.penult:isAntepenult?specials.antepenult:null;
    if(sym){
      ctx.font=(LINHA>60?'32':'26')+'px Arial';
      ctx.fillText(sym, rx+34, cy+1);
    } else {
      ctx.fillStyle='#B0B0C0';
      ctx.font='700 '+(LINHA>60?'18':'15')+'px Inter,Arial';
      ctx.fillText((i+1)+'º', rx+34, cy);
    }

    // ── NOME ──
    ctx.textAlign='left';
    const nameColors={
      0:'#7A5C00',1:'#4A4A55',2:'#7A3A10',
      last:'#B71C1C',penult:'#33691E',antepenult:'#1A237E',def:'#1A1A2E'
    };
    ctx.fillStyle=i===0?nameColors[0]:i===1?nameColors[1]:i===2?nameColors[2]
      :isLast?nameColors.last:isPenult?nameColors.penult:isAntepenult?nameColors.antepenult:nameColors.def;
    const fs=LINHA>70?24:LINHA>60?21:LINHA>50?19:17;
    ctx.font=(i<3?'800':'600')+' '+fs+'px Inter,Arial';
    const nameMax=n.length>22?n.substring(0,21)+'…':n;
    ctx.fillText(nameMax, rx+64, cy);

    // ── PONTOS ──
    ctx.textAlign='right';
    const ptC=i===0?'#C8960A':i===1?'#5A6472':i===2?'#A0521A'
      :isLast?'#C62828':isPenult?'#558B2F':isAntepenult?'#283593':'#5C0099';
    ctx.fillStyle=ptC;
    ctx.font='800 '+(LINHA>60?22:19)+'px Inter,Arial';
    ctx.fillText(pontos, rx+rw-88, cy-5);
    ctx.fillStyle='#AAAABC';
    ctx.font='500 10px Inter,Arial';
    ctx.fillText('pts', rx+rw-88, cy+12);

    // ── EXATOS ──
    ctx.fillStyle='#8833AA';
    ctx.font='600 '+(LINHA>60?15:13)+'px Inter,Arial';
    ctx.fillText('🎯 '+ex, rx+rw-14, cy);
  });

  // ── RODAPÉ ──
  const yF=TOP+N*LINHA+8;
  ctx.textAlign='center';
  ctx.fillStyle='#9999AA';
  ctx.font='500 11px Inter,Arial';
  ctx.fillText('⚖️ Desempate: placares exatos · ordem alfabética', W/2, yF+22);

  // ── EXPORTAR ──
  canvas.toBlob(async blob=>{
    const file=new File([blob],'ranking-bolao-copa-2026.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'Ranking Bolão Copa 2026'}); return; }catch(e){}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='ranking-bolao-copa-2026.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast('💾 Imagem salva! Compartilhe pelo WhatsApp');
  },'image/png',1.0);
}

function uploadPalpitesPartic(nome){
  // Abre seletor de imagem. Quando admin escolhe, abre a tela de palpites
  // do participante com a imagem fixa no topo como referencia para digitar.
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.style.display='none';
  document.body.appendChild(input);
  input.addEventListener('change', function(){
    const file=input.files[0];
    document.body.removeChild(input);
    if(!file){showToast('Nenhum arquivo selecionado');return;}
    const reader=new FileReader();
    reader.onload=function(e){
      // Guarda imagem so localmente (nao salva no Firebase)
      STATE.imagemRef=e.target.result;
      STATE.imagemRefNome=nome;
      // Abre a tela de palpites do participante
      STATE.partAtual=nome;
      STATE.palpitesLocal=JSON.parse(JSON.stringify(STATE.palpites[nome]||{}));
      STATE.aba='palpites';
      showToast('Digite os palpites de '+nome+' vendo a imagem');
      render();
    };
    reader.readAsDataURL(file);
  });
  input.click();
}

  // Fase de Grupos
  GRUPOS.forEach(g=>{
    linhas.push('━━━ GRUPO '+g.l+' ━━━');

  // Mata-mata
  linhas.push('━━━ MATA-MATA ━━━');
  FASES_MM.forEach(fase=>{
    linhas.push('— '+FASES_LABEL[fase]+' —');
    JOGOS_MM.filter(j=>j.fase===fase).forEach(j=>{
      const t1=resolveTime(j.t1k,STATE.resultados)||j.t1k;
      const t2=resolveTime(j.t2k,STATE.resultados)||j.t2k;
      const v=palMM[j.id];
      const placar=v&&v.g1!==''&&v.g2!==''?v.g1+' × '+v.g2:'___ × ___';
      const n1=(t1||'A definir').replace(/\s\S+$/,'');
      const n2=(t2||'A definir').replace(/\s\S+$/,'');
      linhas.push(j.data+'  '+n1+' '+placar+' '+n2);
    });
    linhas.push('');
  });

  // Especiais
  linhas.push('━━━ PALPITES ESPECIAIS ━━━');
  linhas.push('🏆 Campeão:     '+(esp.camp||'___________________'));
  linhas.push('🥈 Vice-Campeão: '+(esp.vice||'___________________'));
  linhas.push('🥇 Artilheiro:   '+(esp.art||'___________________'));

  // Monta HTML para impressão sem template literals aninhados
  var linhasHtml = linhas.map(function(l){
    if(l.indexOf('━━━')===0) return '<div class="secao">'+l+'</div>';
    if(l.indexOf('—')===0) return '<div class="secao" style="background:#e8f5e9">'+l+'</div>';
    if(l==='') return '<br/>';
    return '<div class="linha">'+l+'</div>';
  }).join('');

  var htmlPrint = '<!DOCTYPE html><html><head><meta charset="UTF-8"/>'
    + '<style>'
    + 'body{font-family:monospace;font-size:11px;margin:20px;color:#000;}'
    + 'h1{font-size:16px;text-align:center;margin-bottom:4px;}'
    + 'h2{font-size:12px;text-align:center;color:#444;margin-bottom:16px;}'
    + '.linha{padding:2px 0;border-bottom:1px dotted #ddd;}'
    + '.secao{font-weight:bold;margin-top:12px;margin-bottom:4px;background:#f0f0f0;padding:3px 6px;}'
    + '</style></head><body>'
    + '<h1>&#x26BD; BOLAO COPA DO MUNDO 2026</h1>'
    + '<h2>Participante: '+nome+' | '+new Date().toLocaleDateString('pt-BR')+'</h2>'
    + linhasHtml
    + '</body></html>';

  var w=window.open('','_blank');
  if(!w){showToast('Permita pop-ups para imprimir!');return;}
  w.document.write(htmlPrint);
  w.document.close();
  setTimeout(function(){w.print();},400);
}

function exportarPalpites(){
  const linhas=['Participante;Jogo;Data;Time 1;Gols 1;Gols 2;Time 2;Fase'];
  STATE.partics.forEach(p=>{
    const n=getNome(p);
    const pal=STATE.palpites[n]||{};
    JOGOS_GRUPO.forEach(j=>{
      const v=pal[j.id];
      if(v&&v.g1!==''&&v.g2!=='')linhas.push(n+';'+j.id+';'+j.data+';'+j.t1+';'+v.g1+';'+v.g2+';'+j.t2+';Grupo '+j.grupo);
    });
    const palMM=STATE.palpites[n+'_mm']||{};
    JOGOS_MM.forEach(j=>{
      const v=palMM[j.id];
      if(v&&v.g1!==''&&v.g2!==''){
        const t1=resolveTime(j.t1k,STATE.resultados)||j.t1k;
        const t2=resolveTime(j.t2k,STATE.resultados)||j.t2k;
        linhas.push(n+';'+j.id+';'+j.data+';'+t1+';'+v.g1+';'+v.g2+';'+t2+';'+FASES_LABEL[j.fase]);
      }
    });
    const e=STATE.especiais[n]||{};
    if(e.camp||e.vice||e.art)linhas.push(n+';ESPECIAL;-;Campeão: '+(e.camp||'-')+';-;-;Vice: '+(e.vice||'-')+' | Art: '+(e.art||'-')+';Especiais');
  });
  const csv='\uFEFF'+linhas.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='bolao-palpites.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 Exportado!');
}

        onchange="${onChange}('${jogo.id}','g1',this.value)"/>

      <span class="px">×</span>

    if(usuario.isAdmin){
      // Admin: pode editar
      html+=`<div class="card"><div class="ct">⚙️ Configure as Regras do Bolão</div><div class="cb">
        <p style="font-size:13px;color:#666;font-weight:600;margin-bottom:14px">Alterações salvas automaticamente.</p>`;
      [
        {id:'r_exato',icon:'🎯',tit:t('Placar Exato','Exact Score')+' ('+t('Grupos','Groups')+')',sub:t('Acertou o placar certinho (ex: 2×1)','Predicted the exact score (e.g. 2×1)')},
        {id:'r_venc',icon:'✅',tit:t('Vencedor / Empate','Winner / Draw')+' ('+t('Grupos','Groups')+')',sub:t('Acertou quem ganhou ou que empatou','Predicted the winner or draw')},
        {id:'r_camp',icon:'🏆',tit:t('Campeão','Champion'),sub:t('Acertou a seleção campeã do mundo','Predicted the world champion')},
        {id:'r_vice',icon:'🥈',tit:t('Vice-Campeão','Runner-Up'),sub:t('Acertou a seleção vice-campeã','Predicted the runner-up')},
        {id:'r_art',icon:'🥇',tit:t('Artilheiro','Top Scorer'),sub:t('Acertou o artilheiro da Copa','Predicted the top scorer')},
        {id:'r_mmexato',icon:'⚔️',tit:t('Placar Exato (Mata-Mata)','Exact Score (Knockout)'),sub:t('Placar exato em jogo eliminatório','Exact score in knockout match')},
        {id:'r_mmvenc',icon:'⚔️',tit:t('Vencedor (Mata-Mata)','Winner (Knockout)'),sub:t('Acertou o classificado, mas não o placar','Predicted the winner but not the score')},
      ].forEach(r=>{
        html+=`<div class="rrow">
          <div class="ricon">${r.icon}</div>
          <div class="rdesc"><div class="rtit">${r.tit}</div><div class="rsub">${r.sub}</div></div>
          <input class="rnum" type="number" min="0" max="999" value="${regras[r.id]??DEFAULT_REGRAS[r.id]}"
            onchange="changeRegra('${r.id}',this.value)"/>
        </div>`;
      });
      html+=`</div></div>`;
    } else {
      // User normal: só lê
      html+=`<div class="card"><div class="ct">${t("⚙️ Regras de Pontuação","⚙️ Scoring Rules")}</div><div class="cb">
        <p style="font-size:13px;color:var(--text2);margin-bottom:14px">${t("Veja quantos pontos você ganha em cada acerto.","See how many points you earn for each correct prediction.")}</p>`;
      [
        {id:'r_exato',icon:'🎯',tit:t('Placar Exato','Exact Score')+' ('+t('Grupos','Groups')+')',sub:t('Acertou o placar certinho (ex: 2×1)','Predicted the exact score (e.g. 2×1)')},
        {id:'r_venc',icon:'✅',tit:t('Vencedor / Empate','Winner / Draw')+' ('+t('Grupos','Groups')+')',sub:t('Acertou quem ganhou ou que empatou','Predicted the winner or draw')},
        {id:'r_camp',icon:'🏆',tit:t('Campeão','Champion'),sub:t('Acertou a seleção campeã do mundo','Predicted the world champion')},
        {id:'r_vice',icon:'🥈',tit:t('Vice-Campeão','Runner-Up'),sub:t('Acertou a seleção vice-campeã','Predicted the runner-up')},
        {id:'r_art',icon:'🥇',tit:t('Artilheiro','Top Scorer'),sub:t('Acertou o artilheiro da Copa','Predicted the top scorer')},
        {id:'r_mmexato',icon:'⚔️',tit:t('Placar Exato (Mata-Mata)','Exact Score (Knockout)'),sub:t('Placar exato em jogo eliminatório','Exact score in knockout match')},
        {id:'r_mmvenc',icon:'⚔️',tit:t('Vencedor (Mata-Mata)','Winner (Knockout)'),sub:t('Acertou o classificado, mas não o placar','Predicted the winner but not the score')},
      ].forEach(r=>{
        html+=`<div class="rrow">
          <div class="ricon">${r.icon}</div>
          <div class="rdesc"><div class="rtit">${r.tit}</div><div class="rsub">${r.sub}</div></div>
          <div style="font-weight:700;color:#660099;font-size:18px;min-width:40px;text-align:right">${regras[r.id]??DEFAULT_REGRAS[r.id]}</div>
        </div>`;
      });
      html+=`</div></div>`;
    }
    
    // Botão de imprimir (pra todos)
    html+=`<button class="btn2" onclick="exportarRegras()">${t("🖨️ Imprimir Regras","🖨️ Print Rules")}</button>`;
    
    // Exportar dados (pra todos)
    html+=`<div class="card"><div class="ct">${t("📥 Exportar Dados","📥 Export Data")}</div><div class="cb">
      <p style="font-size:13px;color:#666;font-weight:600;margin-bottom:10px">${t("Baixe todos os palpites em planilha (.csv).","Download all predictions as spreadsheet (.csv).")}</p>
      <button class="btn-export" onclick="exportarPalpites()">${t("📊 Baixar todos os palpites (.csv)","📊 Download all predictions (.csv)")}</button>
    </div></div>`;

    // Admin: configurações extras
    if(usuario.isAdmin){
      html+=`<div class="card"><div class="ct">🔑 Código de Acesso do Bolão</div><div class="cb">
        <p style="font-size:13px;color:#666;font-weight:600;margin-bottom:10px">Compartilhe este código com os participantes.</p>
        <div class="codigo-box">
          <div class="codigo-label">Código atual</div>
          <div class="codigo-atual">${esc(codigo)}</div>
        </div>
        <label class="lbl">Alterar código:</label>
        <input class="inp" id="novoCodInput" value="${esc(novoCodigo)}" placeholder="Ex: COPA2026" maxlength="20"
          oninput="STATE.novoCodigo=this.value.toUpperCase();this.value=STATE.novoCodigo"
          onkeydown="if(event.key==='Enter')changeCodigo()"/>
        <button class="btn" onclick="changeCodigo()">🔑 Salvar novo código</button>
        <div class="aviso" style="margin-top:10px">⚠️ Ao alterar, novos participantes usarão o novo código. Quem já está cadastrado continua acessando.</div>
      </div></div>`;

      html+=`<div class="card"><div class="ct">🌍 Grupos A ao L</div><div class="cb">`;
      GRUPOS.forEach(g=>{
        html+=`<div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:700;color:#660099;margin-bottom:4px">GRUPO ${g.l}</div>
          <div>${g.t.map(t=>`<span class="grupo-chip">${t}</span>`).join('')}</div>
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  // ═══ PRÊMIOS ═══ (também mostrado na aba regras)
  if(aba==='regras'||aba==='premios'){
    const totalPartic=partics.length;
    const valorTotal=totalPartic*STATE.valorPartic;
    const p1lugar=Math.round(valorTotal*STATE.pct1lugar/100);
    const p2lugar=Math.round(valorTotal*STATE.pct2lugar/100);
    const p3lugar=Math.round(valorTotal*STATE.pct3lugar/100);
    const p4lugar=Math.round(valorTotal*STATE.pct4lugar/100);

    // Mostrar prêmio para todos
    html+=`<div class="card"><div class="ct">${t("🏆 Prêmios em Jogo","🏆 Prize Pool")}</div><div class="cb">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:24px;font-weight:700;color:#660099">R$ ${valorTotal.toLocaleString('pt-BR')}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">${totalPartic} ${t("participantes","participants")} × R$ ${STATE.valorPartic.toLocaleString('pt-BR')}</div>
      </div>
      <div class="premia-row">
        <div class="premia-pos">${t("🥇 1º lugar","🥇 1st place")}</div>
        <div class="premia-val">R$ ${p1lugar.toLocaleString('pt-BR')}</div>
        <div class="premia-pct">${STATE.pct1lugar}%</div>
      </div>
      <div class="premia-row">
        <div class="premia-pos">${t("🥈 2º lugar","🥈 2nd place")}</div>
        <div class="premia-val">R$ ${p2lugar.toLocaleString('pt-BR')}</div>
        <div class="premia-pct">${STATE.pct2lugar}%</div>
      </div>
      <div class="premia-row">
        <div class="premia-pos">${t("🥉 3º lugar","🥉 3rd place")}</div>
        <div class="premia-val">R$ ${p3lugar.toLocaleString('pt-BR')}</div>
        <div class="premia-pct">${STATE.pct3lugar}%</div>
      </div>
      ${STATE.pct4lugar>0?`<div class="premia-row" style="border-left-color:#9C27B0">
        <div class="premia-pos">${t("★ 4º lugar","★ 4th place")}</div>
        <div class="premia-val">R$ ${p4lugar.toLocaleString('pt-BR')}</div>
        <div class="premia-pct">${STATE.pct4lugar}%</div>
      </div>`:''}
    </div></div>`;

    // Admin: controle de pagamentos e percentuais
    if(usuario.isAdmin){
      html+=`<div class="card"><div class="ct">💰 Controle de Pagamentos</div><div class="cb">
        <label class="lbl">Valor por participante (R$):</label>
        <input class="inp" type="number" value="${STATE.valorPartic}" min="0" step="1"
          onchange="STATE.valorPartic=parseFloat(this.value);fbSet('valorPartic',STATE.valorPartic);render()"/>
        <label class="lbl">Distribuição de prêmios:</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:4px">1º lugar %</div>
            <input type="number" value="${STATE.pct1lugar}" min="0" max="100" step="0.01"
              onchange="STATE.pct1lugar=parseFloat(this.value);fbSet('pct1lugar',STATE.pct1lugar);render()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px"/>
          </div>
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:4px">2º lugar %</div>
            <input type="number" value="${STATE.pct2lugar}" min="0" max="100" step="0.01"
              onchange="STATE.pct2lugar=parseFloat(this.value);fbSet('pct2lugar',STATE.pct2lugar);render()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px"/>
          </div>
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:4px">3º lugar %</div>
            <input type="number" value="${STATE.pct3lugar}" min="0" max="100" step="0.01"
              onchange="STATE.pct3lugar=parseFloat(this.value);fbSet('pct3lugar',STATE.pct3lugar);render()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px"/>
          </div>
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:4px">4º lugar % <span style="color:#aaa">(0 = desativado)</span></div>
            <input type="number" value="${STATE.pct4lugar}" min="0" max="100" step="0.01"
              onchange="STATE.pct4lugar=parseFloat(this.value);fbSet('pct4lugar',STATE.pct4lugar);render()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px"/>
          </div>
        </div>
        <div class="aviso">📊 Total: ${(STATE.pct1lugar+STATE.pct2lugar+STATE.pct3lugar+STATE.pct4lugar).toFixed(2)}%</div>
      </div></div>`;

      html+=`<div class="card"><div class="ct">👥 Quem Pagou</div><div class="cb">`;
      partics.forEach((p,i)=>{
        const n=getNome(p);
        const pagou=STATE.premios[n]?STATE.premios[n].pagou:false;
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee">
          <input type="checkbox" ${pagou?'checked':''} 
            onchange="const novo={...STATE.premios,'${esc(n)}':{pagou:this.checked}};STATE.premios=novo;fbSet('premios',novo);render()"
            style="width:18px;height:18px;cursor:pointer"/>
          <div style="flex:1">${esc(n)}</div>
          <div style="font-size:12px;color:#666">${pagou?'✅ Pagou':'⏳ Pendente'}</div>
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  html+=`</div>`; // /wrap

  // MODAL
  if(modal&&modal.tipo==='remover'){
    html+=`<div class="m-over" onclick="if(event.target===this){STATE.modal=null;render()}">
      <div class="modal">
        <div class="mh"><h2>Remover participante</h2><button class="mclose" onclick="STATE.modal=null;render()">✕</button></div>
        <div class="mb">
          <p style="font-size:15px;font-weight:700">Remover <strong>${esc(modal.nome)}</strong>?</p>
          <p style="font-size:13px;color:#999;margin-top:6px">Todos os palpites serão apagados.</p>
          <button class="btnR" style="margin-top:16px" onclick="remPartic('${esc(modal.nome)}')">🗑️ Remover</button>
          <button class="btn2" onclick="STATE.modal=null;render()">Cancelar</button>
        </div>
      </div>
    </div>`;
  }

  // TOAST
  if(toast){
    html+=`<div class="toast-wrap"><div class="toast">${esc(toast)}</div></div>`;
  }

  html+=`</div>`; // /app
  root.innerHTML=html;

  // Event delegation para botões com data-acao (evita problemas com nomes especiais)
  root.querySelectorAll('[data-acao]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const idx=parseInt(btn.dataset.idx);
      const acao=btn.dataset.acao;
      const p=STATE.partics[idx];
      if(!p)return;
      const nome=getNome(p);
      if(acao==='bloqueio') toggleBloqueio(nome,'bloqueado');
      else if(acao==='bloqMM') toggleBloqueio(nome,'bloqMM');
      else if(acao==='remover'){STATE.modal={tipo:'remover',nome};render();}
      else if(acao==='cod'){
        const inp=document.getElementById('codinp'+idx);
        if(inp) salvarCodigoPartic(nome,inp.value);
      }
      else if(acao==='upload') uploadPalpitesPartic(nome);
      else if(acao==='convidar') convidarWhatsApp(nome);
      else if(acao==='export') exportarPalpitesPartic(nome);
    });
  });
}

function esc(s){
  if(s===undefined||s===null)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Handlers globais para palpites (chamados pelo innerHTML)
window.changePalpite = (jogoId,field,val) => {
  if(!STATE.palpitesLocal[jogoId])STATE.palpitesLocal[jogoId]={g1:'',g2:''};
  STATE.palpitesLocal[jogoId][field]=val;
  render();
  // Auto-save silencioso
  const novoPal={...STATE.palpites,[STATE.partAtual]:STATE.palpitesLocal};
  STATE.palpites=novoPal;
  fbSet('palpites',novoPal);
};
window.changeMM = (jogoId,field,val) => {
  if(!STATE.palpitesMMLocal[jogoId])STATE.palpitesMMLocal[jogoId]={g1:'',g2:''};
  STATE.palpitesMMLocal[jogoId][field]=val;
  render();
  // Auto-save silencioso
  const novoPal={...STATE.palpites,[STATE.partMMAtual+'_mm']:STATE.palpitesMMLocal};
  STATE.palpites=novoPal;
  fbSet('palpites',novoPal);
};

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init(){
  // Garantir que o idioma padrão seja sempre PT
  // Remove 'en' salvo de sessões anteriores se não foi escolhido explicitamente
  // Sempre PT — idioma só muda se usuário clicar explicitamente no botão
  STATE.idioma='pt';
  localStorage.removeItem('bolao_idioma');
  localStorage.removeItem('bolao_idioma_escolhido');
  render(); // mostra loading
  if(window._firebaseReady){
    carregarTudo().then(()=>setupListeners());
  } else {
    window.addEventListener('firebaseReady',()=>{
      carregarTudo().then(()=>setupListeners());
    });
    // timeout: firebase não configurado
    setTimeout(()=>{
      if(STATE.loading){STATE.loading=false;render();}
    },4000);
  }
}

init();
</script>
</body>
</html>
